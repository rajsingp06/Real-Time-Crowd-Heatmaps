<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Real-Time Venue Heatmap</title>
    <!-- Google Fonts for Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Mock Firebase Analytics for Google Services Tracking -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";
      const firebaseConfig = { projectId: "real-time-crowd-heatmaps", appId: "1:mock-id" };
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      window.logFirebaseEvent = (eventName) => console.log('Analytics Event:', eventName);
    </script>
    
    <!-- Google Translation Integration -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </head>
  <body>
    <div id="app" class="dashboard admin-mode" role="application">
      <!-- Sidebar / Bottom Sheet -->
      <aside class="sidebar" id="main-sidebar" role="complementary" aria-label="Dashboard Sidebar">
        <div class="sidebar-header">
          <h1>Venue Analytics</h1>
          <span class="status-indicator">● LIVE</span>
        </div>

        <div class="stats-section">
          <h2 id="wait-times-title">Facility Wait Times</h2>
          <ul class="wait-times-list" id="wait-times-list">
            <!-- Populated via JS -->
          </ul>
        </div>

        <div class="alerts-section">
          <h2>Active Alerts</h2>
          <div id="alerts-container" class="alerts-container" aria-live="polite" aria-atomic="true">
            <!-- Populated via JS -->
          </div>
        </div>
        
        <!-- Smart Route Suggestions (Attendee Mode only) -->
        <div id="route-panel" class="route-panel hidden">
          <h2>Your Navigation</h2>
          <div id="route-details" class="route-details">
             <p>Select a facility on the map to find the best route.</p>
          </div>
        </div>
      </aside>

      <!-- Main Map Grid -->
      <main class="map-container" role="main">
        <!-- Top Nav for toggling modes -->
        <header class="top-nav" role="navigation" aria-label="Main Navigation">
           <div class="brand">🏟️ Smart Venue</div>
           <div id="google_translate_element" style="margin-left: auto; margin-right: 20px;"></div>
           <div class="view-toggle" role="group" aria-label="Mode Toggles">
              <button id="btn-admin-mode" class="mode-btn active" aria-label="Switch to Admin Dashboard Mode">Admin</button>
              <button id="btn-attendee-mode" class="mode-btn" aria-label="Switch to Attendee Mobile Mode">Attendee</button>
           </div>
        </header>

        <div class="map-wrapper" id="map-wrapper">
          <img src="/stadium_layout.png" id="stadium-layout" alt="Stadium Map layout" />
          <canvas id="heatmaplayer"></canvas>
          
          <!-- Routing & Overlay layers -->
          <svg id="routing-layer" class="overlay-layer" aria-label="Dynamic Routing Path Layer">
            <title>Routing Path Visualization</title>
          </svg>
          
          <!-- Facilities container -->
          <div id="facilities-layer" class="overlay-layer"></div>

          <!-- Mock current attendee location -->
          <div id="current-location" class="location-marker hidden">
            <div class="pulse-ring"></div>
            <div class="marker-core"></div>
          </div>
        </div>
        
        <!-- Bottom Floating Bar for overall stats (Admin Only) -->
        <div class="bottom-stats-bar" id="admin-stats-bar">
          <div class="stat-card">
            <span class="stat-label">Total Attendance</span>
            <span class="stat-value" id="total-attendance">45,210</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Peak Sector</span>
            <span class="stat-value" id="peak-sector">North Stand</span>
          </div>
           <div class="stat-card">
            <span class="stat-label">Avg Flow Rate</span>
            <span class="stat-value" id="flow-rate">120 pax/min</span>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
